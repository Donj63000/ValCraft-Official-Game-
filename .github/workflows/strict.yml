name: ValCraft Strict

on:
  workflow_dispatch:
  push:
  pull_request:

jobs:
  strict:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Setup MSYS2 toolchain
        id: msys2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          path-type: inherit
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja

      - name: Export MSYS2 MinGW tools to PATH
        env:
          MSYS2_LOCATION: ${{ steps.msys2.outputs.msys2-location }}
        run: |
          $mingwBin = Join-Path $env:MSYS2_LOCATION "mingw64\bin"
          if (-not (Test-Path $mingwBin)) {
              throw "MinGW toolchain directory not found: $mingwBin"
          }

          $mingwBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Verify toolchain
        run: |
          gcc --version
          gcov --version
          cmake --version
          ninja --version

      - name: Run strict gate
        run: ./scripts/check.ps1
