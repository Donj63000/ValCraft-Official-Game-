name: ValCraft Perf

on:
  workflow_dispatch:
    inputs:
      smoke_frames:
        description: Smoke frames per scenario
        default: "720"
        required: true
      trace:
        description: Include full per-frame trace in scenario JSON
        type: boolean
        default: false

jobs:
  perf:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh

    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        id: msys2
        with:
          msystem: MINGW64
          update: true
          path-type: inherit
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja

      - name: Export MSYS2 MinGW tools to PATH
        env:
          MSYS2_LOCATION: ${{ steps.msys2.outputs.msys2-location }}
        run: |
          $mingwBin = Join-Path $env:MSYS2_LOCATION "mingw64\bin"
          if (-not (Test-Path $mingwBin)) {
              throw "MinGW toolchain directory not found: $mingwBin"
          }

          $mingwBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Run performance suite
        run: |
          $perfArgs = @(
            "-BuildDir", (Join-Path $PWD "cmake-build-perf"),
            "-ArtifactDir", (Join-Path $PWD "perf-artifacts"),
            "-SmokeFrames", "${{ github.event.inputs.smoke_frames }}"
          )
          if ("${{ github.event.inputs.trace }}" -eq "true") {
            $perfArgs += "-Trace"
          }
          ./scripts/perf.ps1 @perfArgs

      - name: Upload performance artifacts
        uses: actions/upload-artifact@v4
        with:
          name: valcraft-perf-artifacts
          path: perf-artifacts
